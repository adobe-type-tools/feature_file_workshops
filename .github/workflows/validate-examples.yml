name: Validate Feature File Examples

on:
  pull_request:
    paths:
      - 'grammar/**'
      - 'examples/**'
      - 'validate-examples.py'
  push:
    branches:
      - main
    paths:
      - 'grammar/**'
      - 'examples/**'
      - 'validate-examples.py'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Need full history for comparing with base
        ref: ${{ github.event.pull_request.head.sha || github.sha }}  # Test PR branch directly, not merge commit

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Java 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Install Python dependencies
      run: |
        pip install -r .github/requirements.txt

    - name: Set ANTLR4 path
      run: |
        echo "ANTLR4_JAR=$PWD/.github/antlr-4.13.2-complete.jar" >> $GITHUB_ENV

    - name: Check if grammar changed
      id: grammar_check
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^grammar/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
        else
          # On push to main, check last commit
          if git diff --name-only HEAD~1 HEAD | grep -q "^grammar/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
        fi

    - name: Regenerate parser
      if: steps.grammar_check.outputs.changed == 'true'
      run: |
        echo "Grammar files changed, regenerating parser..."
        # Generate Python lexer first
        java -jar $ANTLR4_JAR -Dlanguage=Python3 \
          -lib grammar \
          -o grammar/python_generated \
          grammar/FeatLexerPython.g4
        # Copy .tokens file so FeatParser can find it as FeatLexer.tokens
        cp grammar/python_generated/grammar/FeatLexerPython.tokens grammar/FeatLexer.tokens
        echo "FeatLexer.tokens created from FeatLexerPython.tokens"
        # Generate Python parser
        java -jar $ANTLR4_JAR -Dlanguage=Python3 -visitor \
          -lib grammar \
          -o grammar/python_generated \
          grammar/FeatParser.g4
        # ANTLR with -lib creates nested output; move files to expected location
        cp grammar/python_generated/grammar/*.py grammar/python_generated/
        cp grammar/python_generated/grammar/*.interp grammar/python_generated/ 2>/dev/null || true
        cp grammar/python_generated/grammar/*.tokens grammar/python_generated/ 2>/dev/null || true
        echo "✅ Parser regenerated (warnings about implicit definitions are normal)"

    - name: Upload generated parser files as artifact
      if: steps.grammar_check.outputs.changed == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: generated-parser-files
        path: |
          grammar/python_generated/
          grammar/FeatLexer.tokens
        retention-days: 5

    - name: Validate all examples
      run: |
        mkdir -p lib  # Create lib/ directory for CI (script checks for it)
        python validate-examples.py --force

    - name: Comment on PR (if validation failed)
      if: failure() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '❌ **Feature file validation failed**\n\nSome example files failed to parse. Please check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
          })
